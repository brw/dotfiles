# change the default shell to be non-login
# set -g default-command "${SHELL}"
# set -g default-command "fish"

# color support
set -g default-terminal 'tmux-256color'
# additionally hold shift to disable mouse mode and allow clicking on hyperlinks
set -ga terminal-features ",*:RGB,*:usstyle,*:hyperlinks"
# set -ga terminal-overrides ',alacritty:RGB,xterm-256color:RGB'
# set -ga terminal-overrides ',alacritty:Tc,xterm-256color:Tc'

# get rid of esc delay
set -s escape-time 0

# start window index at 1
set -g base-index 1

# teehee
set -g mouse on
bind-key -n MouseDrag1Status swap-window -d -t=

# show tmux messages for 3 seconds
set -g display-time 3000

# place status bar at the top
set -g status-position top

# increase scrollback buffer size
set -g history-limit 20000

# change terminal title
set -g set-titles on

# forward focus events from terminal to applications
set -g focus-events on

# automatically renumber windows on close
set -g renumber-windows on

# use emacs keybinds in command prompt
set -g status-keys emacs

# allow programs to always bypass tmux using escape sequence
set -g allow-passthrough all

# allow programs to set clipboard through OSC 52
set -g set-clipboard on

# enable CSI u extended keys (kitty keyboard protocol support when)
set -g extended-keys off # breaks bracketed paste in 3.5a, turn back on after next update

# navigation
bind C-n next-window
bind C-p previous-window

# use vim keybinds in copy mode
setw -g mode-keys vi

# below is handled by tmux-yank
# bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# bind -T copy-mode-vi y send-keys -X copy-pipe "wl-copy"
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X other-end \; send-keys -X copy-pipe "wl-copy"
# # bind -T copy-mode-vi MouseDown1Pane send -X copy-mode
# bind -T copy-mode-vi i send-keys -X cancel
# bind -T copy-mode-vi Escape send-keys -X cancel

set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe'

# fix tmux within upterm session
set -ga update-environment "UPTERM_ADMIN_SOCKET"

# toggle synchronize-panes
bind C-x setw synchronize-panes

# additional zoom keybind
bind -n M-z resize-pane -Z

# open new panes in the same directory as the current pane
# (braces to appease the tmux tree-sitter parser)
bind % { split-window -h -c "#{pane_current_path}" }
bind '"' { split-window -v -c "#{pane_current_path}" }
bind v { new-window -c "#{pane_current_path}" }

# I have tmux-matryoshka for nested sessions, but usually I only have one nesting
# level, so it's nice to have a simple shortcut to toggle it
bind -n M-q {
    # set environment "NESTED_LAYER" 1
    set prefix None
    set key-table off
    set status-style fg=colour245,bg=colour238
    # send-keys S-F12
}

bind -T off -n M-q {
    set -u prefix
    set -u key-table
    set -u status-style
    # send-keys S-F11
}

# disable nord status bar
set -g @nord_tmux_show_status_content '0'

set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'M-h'
set -g @tmux-nvim-navigation-keybinding-down 'M-j'
set -g @tmux-nvim-navigation-keybinding-up 'M-k'
set -g @tmux-nvim-navigation-keybinding-right 'M-l'

set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 5
set -g @tmux-nvim-resize-step-y 5
set -g @tmux-nvim-resize-keybinding-left 'M-H'
set -g @tmux-nvim-resize-keybinding-down 'M-J'
set -g @tmux-nvim-resize-keybinding-up 'M-K'
set -g @tmux-nvim-resize-keybinding-right 'M-L'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '
    "ssh"
'
    # ":->fish -c \"printf \e\[7A \"""DC"
    # "~fish->printf \e\[DC6A"

set -g @resurrect-hook-pre-restore-all '/usr/bin/fish -c "set -U did_tmux_restore true && echo pre: (date +%s%3N) $did_tmux_restore | systemd-cat"'
set -g @resurrect-hook-post-restore-all 'fish -c "set -e did_tmux_restore && echo post: (date +%s%3N) $did_tmux_restore | systemd-cat"'

# keybind to disable outer-most active tmux
set -g @matryoshka_down_keybind 'S-F12'
# keybind to enable inner-most inactive tmux
set -g @matryoshka_up_keybind 'S-F11'
# keybind to recursively enable all tmux instances
set -g @matryoshka_up_recursive_keybind 'S-F10'

set -g @plugin 'nordtheme/tmux'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'wfxr/tmux-fzf-url'
# set -g @plugin 'niqodea/tmux-matryoshka'
# set -g @plugin 'IdoKendo/tmux-lazy'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'RyanMacG/tpm-redux'

if "test ! -d ~/.config/tmux/plugins/tpm-redux" {
    set-hook -g session-created {
        set-hook -gu session-created
        run 'git clone https://github.com/RyanMacG/tpm-redux ~/.config/tmux/plugins/tpm-redux'
        display-popup -E -w 80% -h 75% "~/.config/tmux/plugins/tpm-redux/bindings/install_plugins"
        run "~/.config/tmux/plugins/tpm-redux/tpm"
    }
}

run "~/.config/tmux/plugins/tpm-redux/tpm"
