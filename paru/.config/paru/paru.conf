#
# $PARU_CONF
# /etc/paru.conf
# ~/.config/paru/paru.conf
#
# See the paru.conf(5) manpage for options

#
# GENERAL OPTIONS
#
[options]
PgpFetch
Devel
Provides = all
DevelSuffixes = -git -cvs -svn -bzr -darcs -always -hg -fossil
#AurOnly
BottomUp
#RemoveMake
SudoLoop
#InstallDebug
#UseAsk
SaveChanges
CombinedUpgrade
BatchInstall
#CleanAfter
UpgradeMenu
NewsOnUpgrade
KeepSrc

#LocalRepo
#Chroot
#Sign
#SignDb
#KeepRepoCache

#
# Binary OPTIONS
#
[bin]
#FileManager = nvim
#MFlags = --skippgpcheck
#Sudo = doas
Pager = bat
